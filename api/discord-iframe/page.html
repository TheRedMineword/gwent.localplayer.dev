<script>
(async () => {

    const host = location?.ancestorOrigins[0] || location.hostname;
    console.log("DC HOST", host, location.hostname, location);

    const isLocalhost_discordInvite=
    host.includes("localhost") ||
    host.includes("127.0.0.1") ||
    host.includes("[::1]");
    
const isElectronLauncher_discordInvite=
    isLocalhost_discordInvite&&
    location.port === "1111";
    console.log("DC HOST", isLocalhost_discordInvite, isElectronLauncher_discordInvite);
const api_url_discordInvite=
    isElectronLauncher_discordInvite
        ? "https://drmineword-gwent.onrender.com" // or i could just http://127.0.0.1:1111 but nahhhh
        : isLocalhost_discordInvite
            ? "http://localhost:8080"
            : "https://drmineword-gwent.onrender.com";

    const api_url_login_reg = api_url_discordInvite;
    const params = new URLSearchParams(window.location.search);
    const var64 = params.get("64") || false;
    var url_is = `${api_url_login_reg}/api/discord-iframe/invite.json`;
    if (var64){
        url_is = `data:text/plain;charset=utf-8;base64,${var64}`;
    }
    const cfg = await fetch(
        url_is
    ).then(r => r.json());

    let widgetData = null;
    let inviteData = null;

    let var_cus_banner = null;
    try {
        var_cus_banner = cfg.c_banner;
    } catch (e){

    }
//   try {
//        widgetData = await fetch(cfg.widget)
//            .then(r => r.json());
//    } catch (e) {
//       console.error("Widget fetch failed", e);
//    }

    try {
        inviteData = await fetch(
            `https://discord.com/api/v10/invites/${cfg.invite}?with_counts=true`
        ).then(r => r.json());
    } catch (e) {
        console.error("Invite fetch failed", e);
    }

    const guild =
        inviteData?.guild ||
        {};

    const serverName =
        guild.name ||
        widgetData?.name ||
        "Discord Server";
    console.log("guild / name\n", JSON.stringify(guild), "/", serverName);
    const icon =
        guild.icon
            ? `https://cdn.discordapp.com/icons/${guild.id}/${guild.icon}.png?size=512`
            : "";

    const banner = var_cus_banner
    ? var_cus_banner
    : guild.banner
        ? `https://cdn.discordapp.com/banners/${guild.id}/${guild.banner}.png?size=2048`
        : "";

    const online =
        inviteData?.approximate_presence_count ??
        widgetData?.presence_count ??
        0;

    const members =
        inviteData?.approximate_member_count ??
        0;

    function getDominantColor(url) {
        return new Promise(resolve => {

            if (!url) {
                resolve("88,101,242");
                return;
            }

            const img = new Image();
            img.crossOrigin = "anonymous";

            img.onload = () => {

                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");

                canvas.width = 64;
                canvas.height = 64;

                ctx.drawImage(img, 0, 0, 64, 64);

                const data =
                    ctx.getImageData(0, 0, 64, 64).data;

                let r = 0;
                let g = 0;
                let b = 0;
                let count = 0;

                for (let i = 0; i < data.length; i += 16) {
                    r += data[i];
                    g += data[i + 1];
                    b += data[i + 2];
                    count++;
                }

                resolve(
                    `${Math.round(r / count)},${Math.round(g / count)},${Math.round(b / count)}`
                );
            };

            img.onerror = () =>
                resolve("88,101,242");

            img.src = url;
        });
    }

    const color =
        await getDominantColor(
            banner || icon
        );
    console.log("color", color);
    console.log("color url", banner || icon);
    const root =
        document.getElementById("discordInvite");
    console.log("root", root);
    root.innerHTML = `
        <div class="discord-card">
            ${
                banner
                ? `<div class="banner" style="background-image:url('${banner}')"></div>`
                : ""
            }

            <div class="content">

                ${
                    icon
                    ? `<img class="icon" src="${icon}" alt="">`
                    : ""
                }

                <h2>${serverName}</h2>

                <div class="stats">
                    <span>${online} online</span>
                    <span>${members} members</span>
                </div>

                <a
                    class="join"
                    href="#"
                >
                    Join Server
                </a>

            </div>
        </div>
    `;

    root.style.setProperty(
        "--guild-rgb",
        color
    );
    //    console.warn(" document.querySelector");
    document.querySelector('.join').addEventListener('click', (e) => {
    e.preventDefault();

    const url = `https://discord.gg/${cfg.invite}`;

    try {
        // your custom API (if it exists)
        console.log("OPEN URL", url);
        if (window.electronAPI?.openExternal) {
            console.log("EXE APP");
            window.electronAPI.openExternal(url);
        } else {
            console.error('No electron API');
            throw new Error('No electron API');
        }
    } catch (err) {
        console.warn('fallback to normal browser behavior');
        window.open(url, '_blank');
    }
});

})();
</script>
